{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Mundial 2026{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg sticky-top fwc-navbar">
      <div class="container">
        <a class="navbar-brand fwc-brand" href="{% url 'home' %}">
          <img class="fwc-brand-logo" src="{% static 'img/logo_fwc26.png' %}" alt="FIFA World Cup 2026">
          <span class="fwc-brand-copy">
            <span class="fwc-brand-kicker">Fixture oficial</span>
            <span>Mundial 2026</span>
          </span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Abrir navegación">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
            <li class="nav-item"><a class="nav-link fwc-nav-link" href="{% url 'home' %}">Inicio</a></li>
            <li class="nav-item"><a class="nav-link fwc-nav-link" href="{% url 'group_list' %}">Grupos</a></li>
            <li class="nav-item"><a class="nav-link fwc-nav-link" href="{% url 'fixture_list' %}">Fixture</a></li>
            <li class="nav-item"><a class="nav-link fwc-btn fwc-btn-secondary ms-lg-2" href="{% url 'bracket' %}">Bracket</a></li>
          </ul>
        </div>
      </div>
    </nav>
    <main class="container fwc-page">
      {% for message in messages %}
        <div class="alert alert-success">{{ message }}</div>
      {% endfor %}
      {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
